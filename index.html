<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente DAPyT</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #3498db; --action: #f1c40f; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        #app { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .escudo-main { display: block; margin: 0 auto 10px; width: 80px; height: auto;}
        .header small { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--accent); }
        
        .box-accion { background: #2c2500; border-left: 5px solid var(--action); color: var(--action); padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; line-height: 1.5; }
        .box-danger { background: #3d0a0a; border-left: 5px solid var(--danger); color: #ffb3b3; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .btn { display: block; width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-action { background: var(--action); color: black; }
        .btn-secondary { background: #333; margin-top: 10px; }
        
        #log-acta { background: #000; color: var(--success); font-family: 'Courier New', monospace; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.85rem; border: 1px solid #1a1a1a; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <img src="icon-192.png" alt="DAPyT" class="escudo-main">
        <small>División Análisis y Pericias Tecnológicas</small>
    </div>
    <h2 id="titulo"></h2>
    <div id="contenido"></div>
    <div id="opciones"></div>
</div>

<script>
let datosGral = {}; // Datos legales
let datosEquipo = {}; // Datos del dispositivo
let nodoActual = "inicio_legal";

const protocolo = {
    "inicio_legal": {
        "texto": "DATOS DE LA CAUSA:",
        "campos": ["Carátula", "Sumario Nro", "Juzgado/Fiscalía", "Lugar de Recolección", "Responsable"],
        "sig": "inicio"
    },
    "inicio": {
        "texto": "Seleccione el tipo de dispositivo:",
        "opciones": [
            { "label": "📱 Móvil / Celular", "sig": "mov_estado" },
            { "label": "🖥️ PC de Escritorio", "sig": "pc_estado" },
            { "label": "💻 Laptop / Notebook", "sig": "lap_estado" },
            { "label": "📹 Imagen y Video (DVR)", "sig": "vid_id" }
        ]
    },

    /* --- MÓVILES --- */
    "mov_estado": {
        "texto": "¿Estado del dispositivo?",
        "opciones": [
            { "label": "Encendido (AFU)", "sig": "mov_on_inst", "log": () => datosEquipo.estado = "CALIENTE-AFU" },
            { "label": "Apagado (BFU)", "sig": "mov_off_inst", "log": () => datosEquipo.estado = "FRÍO-BFU" }
        ]
    },
    "mov_on_inst": {
        "tipo": "instruccion", "danger": true,
        "texto": "ORDEN CRÍTICA: ¡NO APAGAR!\n1. Activar MODO AVIÓN.\n2. Desactivar WIFI y Bluetooth.\n3. Conectar a batería externa si es necesario.",
        "sig": "mov_sim"
    },
    "mov_off_inst": {
        "tipo": "instruccion",
        "texto": "ORDEN: ¡MANTENER APAGADO!\nProceda a la identificación física sin encender el equipo.",
        "sig": "mov_sim"
    },
    "mov_sim": {
        "texto": "¿Posee tarjeta SIM EXTRAIBLE?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_sim_accion" },
            { "label": "NO", "sig": "mov_reg", "log": () => datosEquipo.sim = "No posee" }
        ]
    },
    "mov_sim_accion": {
        "texto": "ACCIÓN: Extraer SIM y registrar ICCID. Adherir con cinta al equipo.",
        "campos": ["Nro SIM", "Empresa", "Slot de origen"],
        "sig": "mov_reg"
    },
    "mov_reg": {
        "texto": "Identificación del móvil (Solo lo visible):",
        "campos": ["Marca", "Modelo Técnico", "Color","IMEI (si es visible)", "Nro Serie", "Daños", "Funda"],
        "sig": "mov_mem"
    },
    "mov_mem": {
        "texto": "¿Posee tarjeta de memoria?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_mem_reg" },
            { "label": "NO", "sig": "final_universal" }
        ]
    },
    "mov_mem_reg": {
        "texto": "Datos de memoria:",
        "campos": ["Tipo Memoria", "Capacidad", "Inscripción"],
        "sig": "final_universal"
    },
    /* --- LAPTOP / NOTEBOOK --- */
    "lap_estado": {
        "texto": "¿Equipo encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_aislar", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "lap_off_accion", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "lap_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: De ser necesario, aislar el equipo de las redes y conexiones entrantes/salientes (Cable de red, Wifi, Bluetooth).",
        "sig": "lap_prot"
    },
    "lap_prot": {
        "texto": "¿Protector de Pantalla Activado?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_mouse" },
            { "label": "NO", "sig": "lap_doc" }
        ]
    },
    "lap_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "ADVERTENCIA: Mover mouse (no hacer click).",
        "sig": "lap_doc"
    },
    "lap_doc": {
        "texto": "Fotografiar pantalla y documentar información visible:",
        "campos": ["Usuario Visible", "Fecha y Hora Sistema"],
        "sig": "lap_adquisicion"
    },
    "lap_adquisicion": {
        "tipo": "instruccion",
        "texto": "ACCIÓN ESPECIALISTA: En casos autorizados, proceder a adquisición de memoria RAM, imagen forense o descarga de nube. Plasmar 2 valores de HASH en el acta.",
        "sig": "lap_off_accion"
    },
    "lap_off_accion": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desconectar cables de alimentación y, de ser posible, extraer batería. De no ser posible, apagar el equipo presionando el botón de encendido por DIEZ (10) segundos.",
        "sig": "lap_reg"
    },
    "lap_reg": {
        "texto": "Identificar y registrar (visible):",
        "campos": ["Marca", "Modelo", "Número de serie", "Estado de conservación", "Otras características (stickers, rupturas)"],
        "sig": "lap_embalaje"
    },
    "lap_embalaje": {
        "tipo": "final",
        "texto": "Proceder al Embalaje, rotulado y preservación. Fajar/clausurar puertos y accesos a discos. Incorporar firmas de intervinientes en cierres y pliegues del contenedor."
    },

    /* --- PC ESCRITORIO --- */
    "pc_estado": {
        "texto": "¿Equipo encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_aislar", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "pc_off_accion", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "pc_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: Aislar de redes (Desconectar LAN, Wifi, Bluetooth).",
        "sig": "pc_monitor"
    },
    "pc_monitor": {
        "texto": "¿Monitor encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_prot" },
            { "label": "NO", "sig": "pc_mon_on" }
        ]
    },
    "pc_mon_on": { "tipo": "instruccion", "texto": "ACCIÓN: Encender monitor.", "sig": "pc_prot" },
    "pc_prot": {
        "texto": "¿Protector de pantalla activo?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_mouse" },
            { "label": "NO", "sig": "pc_doc" }
        ]
    },
    "pc_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "ADVERTENCIA: Mover mouse suavemente. ¡NO HACER CLICK!",
        "sig": "pc_doc"
    },
    "pc_doc": {
        "texto": "Registro de pantalla:",
        "campos": ["Usuario Visible", "Fecha_Hora Sistema"],
        "sig": "pc_apagar"
    },
    "pc_apagar": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Una vez documentado, DESCONECTAR CABLE DE ALIMENTACIÓN.",
        "sig": "final_universal"
    },
    "pc_off_accion": {
        "tipo": "instruccion", "texto": "ACCIÓN: Desconectar cable de alimentación.", "sig": "final_universal" },

    /* --- VIDEO --- */
    "vid_id": {
        "texto": "Identificación de Video:",
        "campos": ["Tipo Sistema", "Almacenamiento"],
        "sig": "vid_on"
    },
    "vid_on": {
        "texto": "¿Equipo encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "vid_on_inst", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "vid_off_inst", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "vid_on_inst": { "tipo": "instruccion", "texto": "ACCIÓN: Si no hay especialista para volcado caliente, DESCONECTAR ALIMENTACIÓN.", "sig": "final_universal" },
    "vid_off_inst": { "tipo": "instruccion", "texto": "ACCIÓN: Desconectar alimentación para secuestro.", "sig": "final_universal" },

    "final_universal": {
        "tipo": "final",
        "texto": "Fajar/clausurar puertos y tornillos de acceso. Confeccionar cadena de custodia."
    }
};

function render() {
    const node = protocolo[nodoActual];
    const cont = document.getElementById('contenido');
    const opts = document.getElementById('opciones');
    document.getElementById('titulo').innerText = node.texto;
    cont.innerHTML = ""; opts.innerHTML = "";

    if (node.campos) {
        node.campos.forEach(c => {
            const i = document.createElement('input');
            i.placeholder = c; i.id = `f_${c}`; cont.appendChild(i);
        });
        const b = document.createElement('button'); b.className = "btn btn-action"; b.innerText = "Registrar y Continuar";
        b.onclick = () => {
            node.campos.forEach(c => {
                const val = document.getElementById(`f_${c}`).value;
                if(nodoActual === "inicio_legal") datosGral[c] = val;
                else datosEquipo[c] = val;
            });
            irA(node.sig);
        };
        opts.appendChild(b);
    } else if (node.tipo === "instruccion") {
        cont.innerHTML = `<div class="${node.danger ? 'box-danger' : 'box-accion'}">${node.texto.replace(/\n/g, '<br>')}</div>`;
        const b = document.createElement('button'); b.className = "btn"; b.innerText = "ORDEN CUMPLIDA";
        b.onclick = () => irA(node.sig); opts.appendChild(b);
    } else if (node.tipo === "final") {
        // --- GENERADOR DE PLANILLA ESTILO SEGUNDO CÓDIGO ---
        let planilla = `*** FORMULARIO DE CADENA DE CUSTODIA ***\n`;
        planilla += `FECHA: ${new Date().toLocaleDateString()} | HORA: ${new Date().toLocaleTimeString()}\n`;
        planilla += `CARÁTULA: ${datosGral["Carátula"] || "-"}\nSUMARIO: ${datosGral["Sumario Nro"] || "-"}\n`;
        planilla += `JUZGADO/FISCALÍA: ${datosGral["Juzgado/Fiscalía"] || "-"}\n`;
        planilla += `LUGAR: ${datosGral["Lugar de Recolección"] || "-"}\n`;
        planilla += `------------------------------------------------\n`;
        planilla += `IDENTIFICACIÓN DEL MATERIAL:\n`;
        for (let k in datosEquipo) planilla += `- ${k.toUpperCase()}: ${datosEquipo[k]}\n`;
        planilla += `------------------------------------------------\n`;
        planilla += `RESPONSABLE: ${datosGral["Responsable"] || "-"}\n`;
        planilla += `\nESTADO FINAL: ${node.texto}`;

        cont.innerHTML = `<div id="log-acta">${planilla}</div>`;
        
        const b = document.createElement('button'); b.className = "btn"; b.innerText = "COPIAR RESUMEN";
        b.onclick = () => { navigator.clipboard.writeText(planilla); alert("Copiado al portapapeles."); };
        opts.appendChild(b);
        
        const br = document.createElement('button'); br.className = "btn btn-secondary"; br.innerText = "NUEVO SECUESTRO";
        br.onclick = () => { datosEquipo = {}; nodoActual = "inicio"; render(); };
        opts.appendChild(br);
    } else {
        node.opciones.forEach(o => {
            const b = document.createElement('button'); b.className = "btn"; b.innerText = o.label;
            b.onclick = () => { if(o.log) o.log(); irA(o.sig); }; opts.appendChild(b);
        });
    }
}

function irA(s) { nodoActual = s; render(); }
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
render();
</script>
</body>
</html>
