<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente DAPT - Pericia Oficial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #3498db; --action: #f1c40f; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        #app { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .header { display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 15px; }
        .escudo-main { width: 80px; height: auto; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--accent)); }
        .header small { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; text-align: center; }
        
        .box-accion { background: #2c2500; border-left: 5px solid var(--action); color: var(--action); padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; line-height: 1.4; }
        .box-danger { background: #3d0a0a; border-left: 5px solid var(--danger); color: #ffb3b3; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; line-height: 1.4; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-action { background: var(--action); color: black; }
        #log-acta { background: #000; color: var(--success); font-family: 'Courier New', monospace; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.85rem; border: 1px solid #1a1a1a; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <img src="icon-192.png" alt="Escudo DAPT" class="escudo-main">
        <small>División Análisis y Pericias Tecnológicas</small>
    </div>
    <h2 id="titulo" style="font-size: 1.1rem; color: var(--accent);"></h2>
    <div id="contenido"></div>
    <div id="opciones"></div>
</div>

<script>
let datosGral = {}; 
let datosEquipo = {}; 
let nodoActual = "inicio_legal";

const protocolo = {
    "inicio_legal": {
        "texto": "DATOS DE LA CAUSA",
        "campos": ["Carátula", "Sumario Nro", "Juzgado/Fiscalía", "Lugar de Recolección", "Responsable"],
        "sig": "inicio"
    },

    "inicio": {
        "texto": "Seleccione el tipo de dispositivo:",
        "opciones": [
            { "label": "📱 Móvil / Celular", "sig": "mov_sim_check" },
            { "label": "🖥️ PC de Escritorio", "sig": "pc_estado" },
            { "label": "💻 Laptop / Notebook", "sig": "lap_estado" },
            { "label": "📹 Imagen y Video", "sig": "vid_id" }
        ]
    },

    /* --- FLUJO MÓVILES --- */
    "mov_sim_check": {
        "texto": "¿Existe tarjeta SIM?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_sim_multi" },
            { "label": "NO", "sig": "mov_estado", "log": () => datosEquipo.sim = "No posee" }
        ]
    },
    "mov_sim_multi": {
        "texto": "¿Existe más de una SIM?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_sim_inst_multi" },
            { "label": "NO", "sig": "mov_sim_inst_unica" }
        ]
    },
    "mov_sim_inst_multi": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Extraer, identificar y registrar ICCID y SLOT de cada una. Adherir con cinta al equipo.",
        "campos": ["ICCID SIM 1", "Slot 1", "ICCID SIM 2", "Slot 2"],
        "sig": "mov_estado"
    },
    "mov_sim_inst_unica": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Extraer SIM y registrar ICCID. Adherir con cinta al equipo.",
        "campos": ["ICCID SIM"],
        "sig": "mov_estado"
    },
    "mov_estado": {
        "texto": "¿Dispositivo encendido?",
        "opciones": [
            { "label": "SÍ (AFU)", "sig": "mov_on_inst", "log": () => datosEquipo.estado = "CALIENTE-AFU" },
            { "label": "NO (BFU)", "sig": "mov_reg", "log": () => datosEquipo.estado = "FRÍO-BFU" }
        ]
    },
    "mov_on_inst": {
        "tipo": "instruccion", "danger": true,
        "texto": "ORDEN CRÍTICA: ¡NO APAGAR!\n1. Activar MODO AVIÓN.\n2. Desactivar WIFI.",
        "sig": "mov_reg"
    },
    "mov_reg": {
        "texto": "Identificación Física (Visible):",
        "campos": ["Marca", "Modelo Técnico", "IMEI", "Nro Serie"],
        "sig": "mov_memoria_check"
    },
    "mov_memoria_check": {
        "texto": "¿Posee tarjeta de memoria?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_memoria_reg" },
            { "label": "NO", "sig": "mov_final_Faraday", "log": () => datosEquipo.memoria = "No posee" }
        ]
    },
    "mov_memoria_reg": {
        "texto": "Registro de Memoria:",
        "campos": ["Tipo / Capacidad / Inscripción"],
        "sig": "mov_final_Faraday"
    },
    "mov_final_Faraday": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Aislamiento electromagnético (Bolsa Faraday o 5 vueltas papel aluminio).",
        "sig": "final_universal"
    },

    /* --- FLUJO PC ESCRITORIO --- */
    "pc_estado": {
        "texto": "¿PC encendida?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_aislar", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "pc_desconectar", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "pc_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: Aislar de redes (Desconectar cable LAN, desactivar Wifi y Bluetooth).",
        "sig": "pc_monitor"
    },
    "pc_monitor": {
        "texto": "¿Monitor encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_protector" },
            { "label": "NO", "sig": "pc_encender_mon" }
        ]
    },
    "pc_encender_mon": { "tipo": "instruccion", "texto": "ACCIÓN: Encender monitor.", "sig": "pc_protector" },
    "pc_protector": {
        "texto": "¿Protector de pantalla activo?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_mouse" },
            { "label": "NO", "sig": "pc_documentar" }
        ]
    },
    "pc_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "¡ADVERTENCIA!\nMover mouse suavemente. NO HACER CLICK.",
        "sig": "pc_documentar"
    },
    "pc_documentar": {
        "texto": "Registro de Pantalla:",
        "campos": ["Usuario Visible", "Fecha/Hora Sistema"],
        "sig": "pc_desconectar"
    },
    "pc_desconectar": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desconectar cable de alimentación.",
        "sig": "final_universal"
    },

    /* --- FLUJO LAPTOP (CORREGIDO)  --- */
    "lap_estado": {
        "texto": "¿Laptop encendida?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_aislar", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "lap_reg", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "lap_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: Aislar de redes inmediatamente.",
        "sig": "lap_protector"
    },
    "lap_protector": {
        "texto": "¿Protector de pantalla activo?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_mouse" },
            { "label": "NO", "sig": "lap_documentar" }
        ]
    },
    "lap_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "¡ADVERTENCIA!\nMover mouse suavemente. NO HACER CLICK.",
        "sig": "lap_documentar"
    },
    "lap_documentar": {
        "texto": "Registro de Pantalla:",
        "campos": ["Usuario Visible", "Fecha/Hora Sistema"],
        "sig": "lap_apagar"
    },
    "lap_apagar": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desenchufar y extraer batería. Si no es posible, apagar forzado (POWER 10 seg).",
        "sig": "lap_reg"
    },
    "lap_reg": {
        "texto": "Identificación Física:",
        "campos": ["Marca", "Modelo", "Nro Serie", "Estado"],
        "sig": "final_universal"
    },

    /* --- FLUJO VIDEO --- */
    "vid_id": {
        "texto": "Tipo de Sistema y Almacenamiento:",
        "campos": ["Sistema", "Almacenamiento (Local/Remoto)"],
        "sig": "vid_estado"
    },
    "vid_estado": {
        "texto": "¿Equipo encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "vid_on_accion" },
            { "label": "NO", "sig": "vid_off_accion" }
        ]
    },
    "vid_on_accion": {
        "tipo": "instruccion",
        "texto": "Solo bajo autorización judicial y con especialista: Volcado 'en caliente'. Si no, proceda a desconectar.",
        "sig": "vid_off_accion"
    },
    "vid_off_accion": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desconectar alimentación. Fajar todos los puertos y tornillos de acceso a discos.",
        "sig": "vid_reg"
    },
    "vid_reg": {
        "texto": "Identificación de Video:",
        "campos": ["Marca", "Modelo", "Nro Serie"],
        "sig": "final_universal"
    },

    "final_universal": {
        "tipo": "final",
        "texto": "PROCEDIMIENTO FINALIZADO"
    }
};

function render() {
    const node = protocolo[nodoActual];
    const cont = document.getElementById('contenido');
    const opts = document.getElementById('opciones');
    document.getElementById('titulo').innerText = node.texto;
    cont.innerHTML = ""; opts.innerHTML = "";

    if (node.campos) {
        node.campos.forEach(c => {
            const i = document.createElement('input');
            i.placeholder = c; i.id = `f_${c}`; cont.appendChild(i);
        });
        const b = document.createElement('button'); b.className = "btn btn-action"; b.innerText = "Registrar y Continuar";
        b.onclick = () => {
            node.campos.forEach(c => {
                const val = document.getElementById(`f_${c}`).value;
                if(nodoActual === "inicio_legal") datosGral[c] = val;
                else datosEquipo[c] = val;
            });
            irA(node.sig);
        };
        opts.appendChild(b);
    } else if (node.tipo === "instruccion") {
        cont.innerHTML = `<div class="${node.danger ? 'box-danger' : 'box-accion'}">${node.texto.replace(/\n/g, '<br>')}</div>`;
        const b = document.createElement('button'); b.className = "btn"; b.innerText = "ORDEN CUMPLIDA";
        b.onclick = () => irA(node.sig);
        opts.appendChild(b);
    } else if (node.tipo === "final") {
        let res = `*** FORMULARIO DE CADENA DE CUSTODIA ***\n`;
        res += `FECHA: ${new Date().toLocaleDateString()} | HORA: ${new Date().toLocaleTimeString()}\n`;
        res += `CARÁTULA: ${datosGral["Carátula"] || "-"}\nSUMARIO: ${datosGral["Sumario Nro"] || "-"}\n`;
        res += `JUZGADO: ${datosGral["Juzgado/Fiscalía"] || "-"}\nLUGAR: ${datosGral["Lugar de Recolección"] || "-"}\n`;
        res += `------------------------------------------------\n`;
        res += `IDENTIFICACIÓN DEL MATERIAL:\n`;
        for (let k in datosEquipo) res += `- ${k.toUpperCase()}: ${datosEquipo[k]}\n`;
        res += `------------------------------------------------\n`;
        res += `RESPONSABLE: ${datosGral["Responsable"] || "-"}\n`;
        
        cont.innerHTML = `<div id="log-acta">${res}</div>`;
        const b = document.createElement('button'); b.className = "btn"; b.innerText = "COPIAR RESUMEN";
        b.onclick = () => { navigator.clipboard.writeText(res); alert("Copiado."); };
        opts.appendChild(b);
        const br = document.createElement('button'); br.className = "btn-secondary btn"; br.innerText = "NUEVO SECUESTRO";
        br.onclick = () => { datosEquipo = {}; nodoActual = "inicio"; render(); };
        opts.appendChild(br);
    } else {
        node.opciones.forEach(o => {
            const b = document.createElement('button'); b.className = "btn"; b.innerText = o.label;
            b.onclick = () => { if(o.log) o.log(); irA(o.sig); };
            opts.appendChild(b);
        });
    }
}

function irA(s) { nodoActual = s; render(); }
render();
</script>
</body>
</html>
