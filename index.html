<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API-DAPyT | Asistente de Primera Intervención</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #3498db; --action: #f1c40f; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        #app { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 {font-size: 24px;font-family: 'Segoe UI', sans-serif; font-weight: 500; text-transform: uppercase; margin-top: 10px;} 
        .escudo-main { display: block; margin: 0 auto 10px; width: 80px; height: auto;}
        .header small { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--accent); }
        
        .box-accion { background: #2c2500; border-left: 5px solid var(--action); color: var(--action); padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; line-height: 1.5; }
        .box-danger { background: #3d0a0a; border-left: 5px solid var(--danger); color: #ffb3b3; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .btn { display: block; width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-action { background: var(--action); color: black; }
        .btn-secondary { background: #333; margin-top: 10px; }
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 18px;
            width: auto;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }
        
        #log-acta { background: #000; color: var(--success); font-family: 'Courier New', monospace; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.85rem; border: 1px solid #1a1a1a; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <img src="icon-192.png" alt="DAPyT" class="escudo-main">
        <h1>Asistente Primer Interventor</h1>
        <small>División Análisis y Pericias Tecnológicas</small>
    </div>
    <div id="back-container"></div>
    <h2 id="titulo"></h2>
    <div id="contenido"></div>
    <div id="opciones"></div>
</div>

<script>
let datosGral = {};
let datosEquipo = {};
let nodoActual = "inicio_legal";

// Historial de navegación para el botón Atrás
let historial = [];

// Memoria de valores de campos: { nodo: { campo: valor } }
let camposMemoria = {};

const protocolo = {
    "inicio_legal": {
        "texto": "DATOS DE LA CAUSA:",
        "campos": ["Carátula", "Sumario Nro", "Juzgado/Fiscalía", "Lugar de Recolección", "Responsable"],
        "sig": "inicio"
    },
    "inicio": {
        "texto": "Seleccione el tipo de dispositivo:",
        "opciones": [
            { "label": "📱 Móvil / Celular", "sig": "mov_estado" },
            { "label": "🖥️ PC de Escritorio", "sig": "pc_estado" },
            { "label": "💻 Laptop / Notebook", "sig": "lap_estado" },
            { "label": "📹 Imagen y Video (DVR)", "sig": "vid_id" }
        ]
    },

    /* --- MÓVILES --- */
    "mov_estado": {
        "texto": "¿Estado del dispositivo?",
        "opciones": [
            { "label": "Encendido (AFU)", "sig": "mov_on_inst", "log": () => datosEquipo.estado = "CALIENTE-AFU" },
            { "label": "Apagado (BFU)", "sig": "mov_off_inst", "log": () => datosEquipo.estado = "FRÍO-BFU" }
        ]
    },
    "mov_on_inst": {
        "tipo": "instruccion", "danger": true,
        "texto": "ORDEN CRÍTICA: ¡NO APAGAR!\n1. Activar MODO AVIÓN.\n2. Desactivar WIFI y Bluetooth.\n3. Conectar a batería externa si es necesario.",
        "sig": "mov_sim"
    },
    "mov_off_inst": {
        "tipo": "instruccion",
        "texto": "ORDEN: ¡MANTENER APAGADO!\nProceda a la identificación física sin encender el equipo.",
        "sig": "mov_sim"
    },
    "mov_sim": {
        "texto": "¿Posee tarjeta SIM EXTRAIBLE?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_sim_accion" },
            { "label": "NO", "sig": "mov_reg", "log": () => datosEquipo.sim = "No posee" }
        ]
    },
    "mov_sim_accion": {
        "texto": "ACCIÓN: Extraer SIM y registrar ICCID. Adherir con cinta al equipo.",
        "campos": ["Nro SIM", "Empresa", "Slot de origen"],
        "sig": "mov_reg"
    },
    "mov_reg": {
        "texto": "Identificación del móvil (Solo lo visible):",
        "campos": ["Marca", "Modelo Técnico", "Color","IMEI (si es visible)", "Nro Serie", "Daños", "Funda"],
        "sig": "mov_mem"
    },
    "mov_mem": {
        "texto": "¿Posee tarjeta de memoria?",
        "opciones": [
            { "label": "SÍ", "sig": "mov_mem_reg" },
            { "label": "NO", "sig": "mov_aislamiento", "log": () => datosEquipo.memoria = "NO POSEE" }
        ]
    },
    "mov_mem_reg": {
        "texto": "Datos de memoria:",
        "campos": ["Tipo Memoria", "Capacidad", "Inscripción"],
        "sig": "mov_aislamiento"
    },
    "mov_aislamiento": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN DE AISLAMIENTO:\nColocar el dispositivo en una bolsa Faraday o aplicar un método de aislamiento electromagnético equivalente (Ej. papel aluminio, mínimo 5 vueltas).",
        "sig": "mov_perifericos"
    },
    "mov_perifericos": {
        "tipo": "instruccion",
        "texto": "ACCIÓN:\nCuando sea posible, secuestrar cargador y cables de datos del dispositivo.",
        "sig": "mov_final"
    },
    "mov_final": {
        "tipo": "final",
        "texto": "Preservar de forma individual en sobre o caja. Incorporar firmas de intervinientes en cierres y pliegues. Confeccionar planilla de cadena de custodia."
    },

    /* --- LAPTOP / NOTEBOOK --- */
    "lap_estado": {
        "texto": "¿Equipo encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_aislar", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "lap_off_accion", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "lap_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: De ser necesario, aislar el equipo de las redes y conexiones entrantes/salientes (Cable de red, Wifi, Bluetooth).",
        "sig": "lap_prot"
    },
    "lap_prot": {
        "texto": "¿Protector de Pantalla Activado?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_mouse" },
            { "label": "NO", "sig": "lap_doc" }
        ]
    },
    "lap_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "ADVERTENCIA: Mover mouse (no hacer click).",
        "sig": "lap_doc"
    },
    "lap_doc": {
        "texto": "Fotografiar pantalla y documentar información visible:",
        "campos": ["Usuario Visible", "Fecha y Hora Sistema"],
        "sig": "lap_adquisicion"
    },
    "lap_adquisicion": {
        "tipo": "instruccion",
        "texto": "ACCIÓN ESPECIALISTA: En casos autorizados, proceder a adquisición de memoria RAM, imagen forense o descarga de nube. Plasmar 2 valores de HASH en el acta.",
        "sig": "lap_off_accion"
    },
    "lap_off_accion": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desconectar cables de alimentación y, de ser posible, extraer batería. De no ser posible, apagar el equipo presionando el botón de encendido por DIEZ (10) segundos.",
        "sig": "lap_reg"
    },
    "lap_reg": {
        "texto": "Identificar y registrar (visible):",
        "campos": ["Marca", "Modelo", "Número de serie", "Estado de conservación", "Otras características (stickers, rupturas)"],
        "sig": "lap_embalaje"
    },
    "lap_embalaje": {
        "tipo": "final",
        "texto": "Proceder al Embalaje, rotulado y preservación. Fajar/clausurar puertos y accesos a discos. Incorporar firmas de intervinientes en cierres y pliegues del contenedor."
    },

    /* --- PC ESCRITORIO --- */
    "pc_estado": {
        "texto": "¿Equipo encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_aislar", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "pc_apagar_cable", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "pc_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: De ser necesario, aislar el equipo de las redes y conexiones entrantes/salientes (Cable de red, Wifi, Bluetooth).",
        "sig": "pc_monitor"
    },
    "pc_monitor": {
        "texto": "¿Monitor encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_prot" },
            { "label": "NO", "sig": "pc_mon_on" }
        ]
    },
    "pc_mon_on": { 
        "tipo": "instruccion", 
        "texto": "ACCIÓN: Encender Monitor.", 
        "sig": "pc_doc" 
    },
    "pc_prot": {
        "texto": "¿Protector de Pantalla Activado?",
        "opciones": [
            { "label": "SÍ", "sig": "pc_mouse" },
            { "label": "NO", "sig": "pc_doc" }
        ]
    },
    "pc_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "ADVERTENCIA: Mover mouse (no hacer click).",
        "sig": "pc_doc"
    },
    "pc_doc": {
        "texto": "Fotografiar pantalla y documentar información visible:",
        "campos": ["Usuario Visible (si está bloqueado)", "Fecha y hora del Sistema Operativo"],
        "sig": "pc_adquisicion"
    },
    "pc_adquisicion": {
        "tipo": "instruccion",
        "texto": "ACCIÓN ESPECIALISTA: En casos autorizados por la autoridad judicial, el personal especialista procede a la adquisición de memoria RAM, imagen forense, o descarga de información de la nube. Plasmar 2 valores de HASH en el acta.",
        "sig": "pc_apagar_cable"
    },
    "pc_apagar_cable": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desconectar cables de alimentación.",
        "sig": "pc_embalaje"
    },
    "pc_embalaje": {
        "tipo": "final",
        "texto": "Proceder al Embalaje del dispositivo, rotulado y preservación. Fajar o clausurar todos los puertos por donde pueda ingresar o egresar información y/o energía. Prestar atención a posibles accesos con tornillos. Incorporar firmas de intervinientes en cierres y pliegues."
    },

    /* --- VIDEO --- */
    "vid_id": {
        "texto": "Identificar tipo de sistema de video y lugar de almacenamiento:",
        "campos": ["Tipo Sistema", "Lugar de Almacenamiento (Local o Remoto)"],
        "sig": "vid_estado"
    },
    "vid_estado": {
        "texto": "¿Equipo Encendido?",
        "opciones": [
            { "label": "SÍ", "sig": "vid_volcado", "log": () => datosEquipo.estado = "ENCENDIDO" },
            { "label": "NO", "sig": "vid_desconectar", "log": () => datosEquipo.estado = "APAGADO" }
        ]
    },
    "vid_volcado": {
        "tipo": "instruccion",
        "texto": "ACCIÓN ESPECIALISTA: En casos autorizados por la autoridad judicial, el personal especialista procede al volcado en caliente a una unidad de almacenamiento extraíble aportada por autoridad judicial requirente.",
        "sig": "vid_desconectar"
    },
    "vid_desconectar": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desconectar cables de alimentación para su secuestro.",
        "sig": "vid_embalaje"
    },
    "vid_embalaje": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Proceder al Embalaje del dispositivo, rotulado y preservación del dispositivo. Fajar o clausurar todos los puertos por donde pueda ingresar o egresar información y/o energía. Prestar atención a posibles accesos con tornillo tales como accesos a discos de almacenamiento.",
        "sig": "vid_reg"
    },
    "vid_reg": {
        "texto": "De ser posible, identificar y registrar (visible):",
        "campos": ["Marca visible", "Modelo", "Número de serie", "Estado de conservación", "Otras características (stickers, rupturas, etc.)"],
        "sig": "vid_final"
    },
    "vid_final": {
        "tipo": "final",
        "texto": "Incorporar firmas de intervinientes en cierres y pliegues del sobre, fajas u otro elemento contenedor. Confeccionar planilla de cadena de custodia para cada dispositivo."
    }
};

// Guardar valores actuales de los campos antes de salir de un nodo
function guardarCamposActuales() {
    const node = protocolo[nodoActual];
    if (node && node.campos) {
        if (!camposMemoria[nodoActual]) camposMemoria[nodoActual] = {};
        node.campos.forEach(c => {
            const el = document.getElementById(`f_${c}`);
            if (el) camposMemoria[nodoActual][c] = el.value;
        });
    }
}

function render() {
    const node = protocolo[nodoActual];
    const cont = document.getElementById('contenido');
    const opts = document.getElementById('opciones');
    const backContainer = document.getElementById('back-container');

    document.getElementById('titulo').innerText = node.texto;
    cont.innerHTML = ""; opts.innerHTML = ""; backContainer.innerHTML = "";

    // Botón Atrás (no se muestra en la primera pantalla)
    if (historial.length > 0) {
        const btnBack = document.createElement('button');
        btnBack.className = "btn-back";
        btnBack.innerHTML = "&#8592; Atrás";
        btnBack.onclick = () => {
            guardarCamposActuales();
            const anterior = historial.pop();
            nodoActual = anterior;
            render();
        };
        backContainer.appendChild(btnBack);
    }

    if (node.campos) {
        node.campos.forEach(c => {
            const i = document.createElement('input');
            i.placeholder = c;
            i.id = `f_${c}`;
            // Restaurar valor guardado si existe
            if (camposMemoria[nodoActual] && camposMemoria[nodoActual][c] !== undefined) {
                i.value = camposMemoria[nodoActual][c];
            }
            cont.appendChild(i);
        });
        const b = document.createElement('button');
        b.className = "btn btn-action";
        b.innerText = "Registrar y Continuar";
        b.onclick = () => {
            node.campos.forEach(c => {
                const val = document.getElementById(`f_${c}`).value;
                if (nodoActual === "inicio_legal") datosGral[c] = val;
                else datosEquipo[c] = val;
                // Guardar en memoria también
                if (!camposMemoria[nodoActual]) camposMemoria[nodoActual] = {};
                camposMemoria[nodoActual][c] = val;
            });
            irA(node.sig);
        };
        opts.appendChild(b);
    } else if (node.tipo === "instruccion") {
        cont.innerHTML = `<div class="${node.danger ? 'box-danger' : 'box-accion'}">${node.texto.replace(/\n/g, '<br>')}</div>`;
        const b = document.createElement('button');
        b.className = "btn";
        b.innerText = "ORDEN CUMPLIDA";
        b.onclick = () => irA(node.sig);
        opts.appendChild(b);
    } else if (node.tipo === "final") {
        let planilla = `*** FORMULARIO DE CADENA DE CUSTODIA ***\n`;
        planilla += `FECHA: ${new Date().toLocaleDateString()} | HORA: ${new Date().toLocaleTimeString()}\n`;
        planilla += `CARÁTULA: ${datosGral["Carátula"] || "-"}\nSUMARIO: ${datosGral["Sumario Nro"] || "-"}\n`;
        planilla += `JUZGADO/FISCALÍA: ${datosGral["Juzgado/Fiscalía"] || "-"}\n`;
        planilla += `LUGAR: ${datosGral["Lugar de Recolección"] || "-"}\n`;
        planilla += `------------------------------------------------\n`;
        planilla += `IDENTIFICACIÓN DEL MATERIAL:\n`;
        for (let k in datosEquipo) planilla += `- ${k.toUpperCase()}: ${datosEquipo[k]}\n`;
        planilla += `------------------------------------------------\n`;
        planilla += `RESPONSABLE: ${datosGral["Responsable"] || "-"}\n`;
        planilla += `\nESTADO FINAL: ${node.texto}`;

        cont.innerHTML = `<div id="log-acta">${planilla}</div>`;
        
        const b = document.createElement('button');
        b.className = "btn";
        b.innerText = "COPIAR RESUMEN";
        b.onclick = () => { navigator.clipboard.writeText(planilla); alert("Copiado al portapapeles."); };
        opts.appendChild(b);
        
        const br = document.createElement('button');
        br.className = "btn btn-secondary";
        br.innerText = "NUEVO SECUESTRO";
        br.onclick = () => {
            datosEquipo = {};
            camposMemoria = {};
            historial = [];
            nodoActual = "inicio";
            render();
        };
        opts.appendChild(br);
    } else {
        node.opciones.forEach(o => {
            const b = document.createElement('button');
            b.className = "btn";
            b.innerText = o.label;
            b.onclick = () => { if (o.log) o.log(); irA(o.sig); };
            opts.appendChild(b);
        });
    }
}

function irA(s) {
    historial.push(nodoActual);
    nodoActual = s;
    render();
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
}
render();
</script>
</body>
</html>
