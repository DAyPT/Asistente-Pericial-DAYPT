<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente DAPT - Pericia Oficial</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #3498db; --action: #f1c40f; --danger: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; display: flex; justify-content: center; }
        #app { max-width: 480px; width: 100%; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header { display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 15px; }
        .escudo-main { width: 80px; height: auto; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--accent)); }
        .header small { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; text-align: center; }
        
        .box-accion { background: #2c2500; border-left: 5px solid var(--action); color: var(--action); padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; }
        .box-danger { background: #3d0a0a; border-left: 5px solid var(--danger); color: #ffb3b3; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 16px; margin-top: 15px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-action { background: var(--action); color: black; }
        #log-acta { background: #000; color: var(--success); font-family: 'Courier New', monospace; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.85rem; border: 1px solid #1a1a1a; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <img src="icon-192.png" alt="Escudo DAPT" class="escudo-main">
        <small>División Análisis y Pericias Tecnológicas</small>
    </div>
    <h2 id="titulo" style="font-size: 1.1rem; color: var(--accent);"></h2>
    <div id="contenido"></div>
    <div id="opciones"></div>
</div>

<script>
let datosGral = {}; 
let datosEquipo = {}; 
let nodoActual = "inicio_legal";

const protocolo = {
    "inicio_legal": {
        "texto": "DATOS DE LA CAUSA",
        "campos": ["Carátula", "Sumario Nro", "Juzgado/Fiscalía", "Lugar de Recolección", "Responsable (Nombre/Legajo)"],
        "sig": "inicio"
    },

    "inicio": {
        "texto": "Seleccione tipo de dispositivo:",
        "opciones": [
            { "label": "📱 Móvil / Celular", "sig": "mov_estado" },
            { "label": "🖥️ PC de Escritorio", "sig": "pc_estado" },
            { "label": "💻 Laptop / Notebook", "sig": "lap_estado" },
            { "label": "📹 Imagen y Video", "sig": "vid_id" }
        ]
    },

    /* --- FLUJO LAPTOP --- */
    "lap_estado": {
        "texto": "¿La Laptop se encuentra encendida?",
        "opciones": [
            { "label": "SÍ (AFU)", "sig": "lap_aislar", "log": () => datosEquipo.estado = "ENCENDIDO (AFU)" },
            { "label": "NO (BFU)", "sig": "lap_identificar", "log": () => datosEquipo.estado = "APAGADO (BFU)" }
        ]
    },
    "lap_aislar": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: Aislar de redes (Desconectar cable LAN, desactivar Wifi y Bluetooth).",
        "sig": "lap_monitor"
    },
    "lap_monitor": {
        "texto": "¿Visualiza el protector de pantalla?",
        "opciones": [
            { "label": "SÍ", "sig": "lap_mouse" },
            { "label": "NO", "sig": "lap_documentar" }
        ]
    },
    "lap_mouse": {
        "tipo": "instruccion", "danger": true,
        "texto": "ACCIÓN: Desplazar ligeramente el mouse. ¡NO TOCAR NINGÚN BOTÓN (NO CLICK)!.",
        "sig": "lap_documentar"
    },
    "lap_documentar": {
        "texto": "Documentación de Pantalla:",
        "campos": ["Usuario Visible", "Fecha/Hora del Sistema"],
        "instruccion": "Fotografiar pantalla y documentar información visible.",
        "sig": "lap_apagar"
    },
    "lap_apagar": {
        "tipo": "instruccion",
        "texto": "ACCIÓN: Desenchufar energía y extraer batería. Si no es posible, apagar presionando botón de encendido por 10 segundos.",
        "sig": "lap_identificar"
    },
    "lap_identificar": {
        "texto": "Identificación Física:",
        "campos": ["Marca", "Modelo", "Nro de Serie", "Estado de Conservación", "Detalles (Stickers/Rupturas)"],
        "sig": "final_universal"
    },

    /* --- OTROS FLUJOS --- */
    "mov_estado": { 
        "texto": "¿Estado?", 
        "opciones": [
            { "label": "Encendido (AFU)", "sig": "mov_on", "log": () => datosEquipo.estado = "ENCENDIDO (AFU)" }, 
            { "label": "Apagado (BFU)", "sig": "mov_reg", "log": () => datosEquipo.estado = "APAGADO (BFU)" }
        ] 
    },
    "mov_on": { 
        "tipo": "instruccion", "danger": true, 
        "texto": "ACCIÓN: Activar Modo Avión. No apagar el equipo.", 
        "sig": "mov_reg" 
    },
    "mov_reg": { 
        "texto": "Datos del Dispositivo:", 
        "campos": ["Marca", "Modelo", "IMEI", "Nro Serie"], 
        "sig": "final_universal" 
    },
    
    "pc_estado": { 
        "texto": "¿PC Encendida?", 
        "opciones": [
            { "label": "SÍ", "sig": "pc_aislar", "log": () => datosEquipo.estado = "ENCENDIDO (AFU)" }, 
            { "label": "NO", "sig": "final_universal", "log": () => datosEquipo.estado = "APAGADO (BFU)" }
        ] 
    },
    "pc_aislar": { 
        "tipo": "instruccion", 
        "texto": "ACCIÓN: Aislar redes y fotografiar pantalla.", 
        "sig": "final_universal" 
    },

    "vid_id": { 
        "texto": "Identificación de Video:", 
        "campos": ["Tipo Sistema", "Almacenamiento (Local/Remoto)"], 
        "sig": "final_universal" 
    },

    /* --- GENERADOR DE CADENA DE CUSTODIA --- */
    "final_universal": {
        "tipo": "final",
        "texto": "PROCEDIMIENTO FINALIZADO: Realizar embalaje, rotulado y faja de seguridad."
    }
};

function render() {
    const node = protocolo[nodoActual];
    const cont = document.getElementById('contenido');
    const opts = document.getElementById('opciones');
    document.getElementById('titulo').innerText = node.texto;
    cont.innerHTML = ""; opts.innerHTML = "";

    if (node.campos) {
        node.campos.forEach(c => {
            const i = document.createElement('input');
            i.placeholder = c; i.id = `f_${c}`; cont.appendChild(i);
        });
        const b = document.createElement('button'); b.className = "btn btn-action"; b.innerText = "Registrar y Continuar";
        b.onclick = () => {
            node.campos.forEach(c => {
                const val = document.getElementById(`f_${c}`).value;
                if(nodoActual === "inicio_legal") datosGral[c] = val;
                else datosEquipo[c] = val;
            });
            irA(node.sig);
        };
        opts.appendChild(b);
    } else if (node.tipo === "instruccion") {
        cont.innerHTML = `<div class="${node.danger ? 'box-danger' : 'box-accion'}">${node.texto}</div>`;
        const b = document.createElement('button'); b.className = "btn"; b.innerText = "ACCIÓN REALIZADA";
        b.onclick = () => irA(node.sig);
        opts.appendChild(b);
    } else if (node.tipo === "final") {
        let planilla = `*** FORMULARIO DE CADENA DE CUSTODIA ***\n`;
        planilla += `FECHA: ${new Date().toLocaleDateString()} | HORA: ${new Date().toLocaleTimeString()}\n`;
        planilla += `CARÁTULA: ${datosGral["Carátula"] || "-"}\nSUMARIO: ${datosGral["Sumario Nro"] || "-"}\n`;
        planilla += `JUZGADO/FISCALÍA: ${datosGral["Juzgado/Fiscalía"] || "-"}\n`;
        planilla += `LUGAR: ${datosGral["Lugar de Recolección"] || "-"}\n`;
        planilla += `------------------------------------------------\n`;
        planilla += `IDENTIFICACIÓN DEL MATERIAL:\n`;
        for (let k in datosEquipo) planilla += `- ${k.toUpperCase()}: ${datosEquipo[k]}\n`;
        planilla += `------------------------------------------------\n`;
        planilla += `RESPONSABLE: ${datosGral["Responsable (Nombre/Legajo)"] || "-"}\n`;
        planilla += `OBS: El material fue preservado según protocolos vigentes.`;

        cont.innerHTML = `<div id="log-acta">${planilla}</div>`;
        const b = document.createElement('button'); b.className = "btn"; b.innerText = "COPIAR PARA EL ACTA";
        b.onclick = () => { navigator.clipboard.writeText(planilla); alert("Copiado al portapapeles."); };
        opts.appendChild(b);
        const br = document.createElement('button'); br.className = "btn-secondary btn"; br.innerText = "NUEVO PROCEDIMIENTO";
        br.onclick = () => { datosEquipo = {}; nodoActual = "inicio"; render(); };
        opts.appendChild(br);
    } else {
        node.opciones.forEach(o => {
            const b = document.createElement('button'); b.className = "btn"; b.innerText = o.label;
            b.onclick = () => { if(o.log) o.log(); irA(o.sig); };
            opts.appendChild(b);
        });
    }
}

function irA(s) { nodoActual = s; render(); }
render();
</script>
</body>
</html>
